server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # PokeDex API proxy (8081)
  location /api/pokedex/ {
    proxy_pass http://pokedex:8081;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /api/pokemon/ {
    proxy_pass http://pokedex:8081;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /api/moves/ {
    proxy_pass http://pokedex:8081;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /api/abilities/ {
    proxy_pass http://pokedex:8081;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /api/items/ {
    proxy_pass http://pokedex:8081;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /api/types {
    proxy_pass http://pokedex:8081;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /api/damage/ {
    proxy_pass http://pokedex:8081;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /api/pokedex {
    proxy_pass http://pokedex:8081;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # Battle API proxy (8090)
  location /api/battle/ {
    proxy_pass http://battlefactory:8090;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /api/user/ {
    proxy_pass http://battlefactory:8090;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # Frontend SPA
  location / {
    try_files $uri $uri/ /index.html;
  }
}
