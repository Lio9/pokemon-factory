# BattleFactory module datasource (uses same SQLITE_DB_PATH as other modules)
spring.datasource.url=jdbc:sqlite:${SQLITE_DB_PATH:../pokemon-factory-backend/pokemon-factory.db}
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.initialization-mode=never

# Flyway config for battle migrations
spring.flyway.locations=classpath:db/migration
spring.flyway.enabled=true
spring.flyway.mixed=true

# Server port (avoid conflict with pokeDex default 8080)
server.port=8090

