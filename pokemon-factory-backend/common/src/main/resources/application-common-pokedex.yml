# application-common-pokedex 文件说明
# 所属模块：common 公共模块。
# 文件类型：YAML 配置文件。
# 核心职责：负责声明模块运行参数、环境配置和基础设施开关。
# 阅读建议：建议优先确认不同 profile 或环境变量的覆盖关系。
# 项目注释补全说明：本注释用于帮助后续维护时快速定位文件在整体架构中的职责。

mybatis-plus:
  # 这部分配置只给 pokeDex 使用，避免 battleFactory 在 Spring Boot 4 环境下误触发 MyBatis-Plus 的 Mapper 代理链。
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.lio9.common.model
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    default-executor-type: BATCH
  global-config:
    db-config:
      id-type: auto
      logic-delete-value: 1
      logic-not-delete-value: 0
      sql-injector: com.baomidou.mybatisplus.core.injector.DefaultSqlInjector

logging:
  level:
    com.baomidou.mybatisplus: debug
