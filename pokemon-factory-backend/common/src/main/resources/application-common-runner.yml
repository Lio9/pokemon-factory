# application-common-runner 文件说明
# 所属模块：common 公共模块。
# 文件类型：YAML 配置文件。
# 核心职责：负责声明模块运行参数、环境配置和基础设施开关。
# 阅读建议：建议优先确认不同 profile 或环境变量的覆盖关系。
# 项目注释补全说明：本注释用于帮助后续维护时快速定位文件在整体架构中的职责。

spring:
  application:
    # common 现在不仅提供公共模型与服务，也承担数据库初始化入口。
    name: common
  main:
    # common 作为数据库初始化程序启动时不需要对外提供 Web 服务。
    web-application-type: none

pokemon-factory:
  database:
    # 只有启动 common 时才会真正执行数据库初始化脚本。
    initialize-on-startup: true
    import-csv-on-startup: true
