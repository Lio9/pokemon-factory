server:
  port: 8081
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain,text/css,text/javascript,application/javascript
    min-response-size: 1024

spring:
  main:
    allow-bean-definition-overriding: true
  datasource:
    url: jdbc:sqlite:./pokemon-factory.db
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      auto-commit: true
      pool-name: PokemonFactorySQLiteCP
  jackson:
    property-naming-strategy: SNAKE_CASE

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.lio9.common.model
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    default-executor-type: BATCH
  global-config:
    db-config:
      id-type: auto
      logic-delete-value: 1
      logic-not-delete-value: 0
      sql-injector: com.baomidou.mybatisplus.core.injector.DefaultSqlInjector

# 导入任务配置
import:
  timeout:
    minutes: 120  # 导入任务超时时间（分钟）
  retry:
    max-attempts: 3
    initial-delay: 1000
  network:
    check-interval: 30000
    connect-timeout: 15000
    read-timeout: 60000

# HTTP 客户端配置
http:
  client:
    max-connections: 100
    connection-pool-size: 50
    keep-alive: true
    follow-redirects: true

logging:
  level:
    com.lio9.common: debug
    com.lio9.pokedex: debug
    org.springframework.web: info
    org.mybatis: info
  config: classpath:log4j2.xml
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    total-size-capacity: 1GB
    max-history: 30
    clean-history-on-start: true