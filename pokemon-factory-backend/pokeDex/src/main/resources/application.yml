server:
  port: 8081
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain,text/css,text/javascript,application/javascript
    min-response-size: 1024

spring:
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    mixed: true
  main:
    allow-bean-definition-overriding: true
  datasource:
    # Use SQLITE_DB_PATH env var to control the DB file location. Default places DB in backend folder.
    # Use SQLITE_DB_PATH env var to control the DB file location. Default places DB in backend folder.
    url: jdbc:sqlite:${SQLITE_DB_PATH:${user.dir}/pokemon-factory-backend/pokemon-factory.db}
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 5  # SQLite是单连接数据库，连接池不宜过大
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 300000
      max-lifetime: 900000  # 15分钟
      connection-test-query: SELECT 1
      connection-init-sql: PRAGMA foreign_keys = ON
      validation-timeout: 3000
      leak-detection-threshold: 60000  # 1分钟，检测连接泄露
      auto-commit: true
      pool-name: PokemonFactorySQLiteCP
  jackson:
    property-naming-strategy: SNAKE_CASE

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.lio9.common.model
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    default-executor-type: BATCH
  global-config:
    db-config:
      id-type: auto
      logic-delete-value: 1
      logic-not-delete-value: 0
      sql-injector: com.baomidou.mybatisplus.core.injector.DefaultSqlInjector

# 导入任务配置
import:
  timeout:
    minutes: 120  # 导入任务超时时间（分钟）
  retry:
    max-attempts: 3
    initial-delay: 1000
  network:
    check-interval: 30000
    connect-timeout: 15000
    read-timeout: 60000
  script:
    path: scripts/import_scheduler.py  # Python导入脚本路径（相对于项目根目录）
    directory: scripts  # Python脚本工作目录（相对于项目根目录）
  log:
    directory: logs  # 日志目录（相对于项目根目录）

# HTTP 客户端配置
http:
  client:
    max-connections: 100
    connection-pool-size: 50
    keep-alive: true
    follow-redirects: true

logging:
  level:
    com.lio9.common: debug
    com.lio9.pokedex: debug
    com.baomidou.mybatisplus: debug
    org.apache.ibatis: debug
    java.sql: debug
    java.sql.Connection: info
    java.sql.Statement: debug
    java.sql.PreparedStatement: debug
    java.sql.ResultSet: warn
    org.springframework.web: info
    org.mybatis: info
  config: classpath:log4j2.xml
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    total-size-capacity: 1GB
    max-history: 30
    clean-history-on-start: true