server:
  port: 8081
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain,text/css,text/javascript,application/javascript
    min-response-size: 1024

spring:
  config:
    # 统一从 common 导入数据库配置，当前模块只保留业务侧配置。
    import: optional:classpath:application-common.yml,optional:classpath:application-common-pokedex.yml
  application:
    name: poke-dex
  main:
    allow-bean-definition-overriding: true
  jackson:
    property-naming-strategy: SNAKE_CASE

# 导入任务配置
# HTTP 客户端配置
http:
  client:
    max-connections: 100
    connection-pool-size: 50
    keep-alive: true
    follow-redirects: true

app:
  cors:
    allowed-origins: http://localhost:7890,http://127.0.0.1:7890,http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173

pokemon-factory:
  assets:
    image-base-url: https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites

logging:
  level:
    com.lio9.common: debug
    com.lio9.pokedex: debug
    org.springframework.web: info
  file:
    total-size-capacity: 1GB
    max-history: 30
    clean-history-on-start: true
