server:
  port: 8081
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain,text/css,text/javascript,application/javascript
    min-response-size: 1024

spring:
  config:
    # 统一从 common 导入数据库配置，当前模块只保留业务侧配置。
    import: optional:classpath:application-common.yml,optional:classpath:application-common-pokedex.yml
  application:
    name: poke-dex
  main:
    allow-bean-definition-overriding: true
  jackson:
    property-naming-strategy: SNAKE_CASE

# 导入任务配置
import:
  timeout:
    minutes: 120  # 导入任务超时时间（分钟）
  retry:
    max-attempts: 3
    initial-delay: 1000
  network:
    check-interval: 30000
    connect-timeout: 15000
    read-timeout: 60000
  script:
    path: scripts/import_scheduler.py  # Python导入脚本路径（相对于项目根目录）
    directory: scripts  # Python脚本工作目录（相对于项目根目录）
  log:
    directory: logs  # 日志目录（相对于项目根目录）

# HTTP 客户端配置
http:
  client:
    max-connections: 100
    connection-pool-size: 50
    keep-alive: true
    follow-redirects: true

logging:
  level:
    com.lio9.common: debug
    com.lio9.pokedex: debug
    org.springframework.web: info
  config: classpath:log4j2.xml
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    total-size-capacity: 1GB
    max-history: 30
    clean-history-on-start: true
