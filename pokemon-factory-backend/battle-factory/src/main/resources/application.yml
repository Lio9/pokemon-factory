# application 文件说明
# 所属模块：battle-factory 后端模块。
# 文件类型：YAML 配置文件。
# 核心职责：负责声明模块运行参数、环境配置和基础设施开关。
# 阅读建议：建议优先确认不同 profile 或环境变量的覆盖关系。
# 项目注释补全说明：本注释用于帮助后续维护时快速定位文件在整体架构中的职责。

spring:
  config:
    # 所有数据库连接、MyBatis 与初始化脚本入口都从 common 导入。
    import: optional:classpath:application-common.yml
  application:
    name: battle-factory

server:
  # 避免与 pokeDex 默认端口冲突。
  port: 8090
